<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Comparison Matrix Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* All your original CSS styles are included below */
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --info-color: #3498db; --danger-color: #e74c3c; --light-bg: #f8f9fa; --border-color: #dcdde1; --text-color: #2f3640; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light-bg); color: var(--text-color); padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background-color: var(--primary-color); color: white; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .management-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-control { width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 4px; margin-bottom: 10px; }
        .btn { padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: 600; }
        .btn-primary { background: var(--secondary-color); }
        .btn-danger { background: var(--danger-color); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid var(--border-color); text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Master Supplier Comparison & Evaluation Grid</h1>
        <span id="sync-indicator">🔄 Connecting...</span>
    </header>

    <div class="management-row">
        <div class="panel">
            <h3>🏢 Suppliers Management Panel</h3>
            <input type="text" id="new-supplier" class="form-control" placeholder="Supplier name...">
            <button class="btn btn-primary" onclick="addSupplier()">Add Supplier</button>
            <div id="supplier-list"></div>
        </div>
        <div class="panel">
            <h3>📦 Disposables / Line Items Panel</h3>
            <input type="text" id="new-item" class="form-control" placeholder="Item description...">
            <div id="mapping-area"></div>
            <button class="btn btn-primary" onclick="addItem()">Add Line Item</button>
        </div>
    </div>

    <div class="panel"><table id="matrix-table"></table></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 🔴 PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyCfXnKMYsJnbBXqgp7Mq7s-ierLgI_ihs8",
  authDomain: "lab-disposables.firebaseapp.com",
  databaseURL: "https://lab-disposables-default-rtdb.firebaseio.com",
  projectId: "lab-disposables",
  storageBucket: "lab-disposables.firebasestorage.app",
  messagingSenderId: "845647001477",
  appId: "1:845647001477:web:b8f40a2e0fe280c5dbf6ec"
};

    const db = getDatabase(initializeApp(firebaseConfig));
    let masterSuppliers = [], matrixDatabase = [];

    onValue(ref(db, 'suppliers'), (s) => {
        masterSuppliers = s.val() || [];
        render();
        document.getElementById('sync-indicator').innerText = "☁️ Synced";
    });

    onValue(ref(db, 'disposables'), (s) => {
        const data = s.val() || {};
        matrixDatabase = Object.keys(data).map(id => ({ id, ...data[id] }));
        render();
    });

    function render() {
        document.getElementById('supplier-list').innerHTML = masterSuppliers.map(s => 
            `<div>${s} <button onclick="removeSup('${s}')">x</button></div>`).join('');
        
        document.getElementById('mapping-area').innerHTML = masterSuppliers.map(s => 
            `<div>${s}: <input id="uom-${s}" placeholder="UOM"> <input id="price-${s}" placeholder="Price"></div>`).join('');

        const table = document.getElementById('matrix-table');
        table.innerHTML = `<tr><th>Item</th>${masterSuppliers.map(s => `<th>${s}</th>`).join('')}<th>Actions</th></tr>` +
            matrixDatabase.map(row => `<tr><td>${row.item}</td>${masterSuppliers.map(s => 
            `<td>UOM: <input value="${row.prices?.[s]?.uom || ''}" onchange="updateCell('${row.id}', '${s}', 'uom', this.value)"> 
             Price: <input value="${row.prices?.[s]?.price || ''}" onchange="updateCell('${row.id}', '${s}', 'price', this.value)"></td>`).join('')}
             <td><button class="btn btn-danger" onclick="removeItem('${row.id}')">Delete</button></td></tr>`).join('');
    }

    window.addSupplier = () => {
        const val = document.getElementById('new-supplier').value;
        if(val) set(ref(db, 'suppliers'), [...masterSuppliers, val]);
    };
    window.removeSup = (s) => set(ref(db, 'suppliers'), masterSuppliers.filter(x => x !== s));
    window.addItem = () => {
        const item = document.getElementById('new-item').value;
        const prices = {};
        masterSuppliers.forEach(s => {
            prices[s] = { uom: document.getElementById(`uom-${s}`).value, price: document.getElementById(`price-${s}`).value };
        });
        push(ref(db, 'disposables'), { item, prices });
    };
    window.removeItem = (id) => remove(ref(db, 'disposables/' + id));
    window.updateCell = (id, s, f, val) => {
        const row = matrixDatabase.find(r => r.id === id);
        row.prices[s][f] = val;
        update(ref(db, 'disposables/' + id), { prices: row.prices });
    };
</script>
</body>
</html>
