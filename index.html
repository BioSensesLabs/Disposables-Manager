<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Supplier Comparison Grid</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --danger-color: #e74c3c; --light-bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--light-bg); padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .panel { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .management-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .matrix-input { width: 80px; padding: 4px; border: 1px solid #ccc; }
        .btn { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; }
    </style>
</head>
<body>

<div class="container">
    <header style="background:var(--primary-color); color:white; padding:20px; border-radius:8px;">
        <h1>Master Supplier Comparison Grid</h1>
        <span id="sync-status">🔄 Connecting...</span>
    </header>

    <div class="management-row">
        <div class="panel">
            <h3>Manage Suppliers</h3>
            <input type="text" id="new-supplier" placeholder="Supplier name...">
            <button class="btn" style="background:var(--secondary-color)" onclick="addSupplier()">Add</button>
            <div id="supplier-list"></div>
        </div>
        <div class="panel">
            <h3>Add Disposable Item</h3>
            <input type="text" id="new-item" placeholder="Item name...">
            <button class="btn" style="background:var(--secondary-color)" onclick="addItem()">Add Item</button>
        </div>
    </div>

    <div class="panel"><table id="matrix-table"></table></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 🔴 REPLACE THIS BLOCK WITH YOUR FULL CONFIG FROM FIREBASE CONSOLE
  const firebaseConfig = {
  apiKey: "AIzaSyCfXnKMYsJnbBXqgp7Mq7s-ierLgI_ihs8",
  authDomain: "lab-disposables.firebaseapp.com",
  databaseURL: "https://lab-disposables-default-rtdb.firebaseio.com",
  projectId: "lab-disposables",
  storageBucket: "lab-disposables.firebasestorage.app",
  messagingSenderId: "845647001477",
  appId: "1:845647001477:web:b8f40a2e0fe280c5dbf6ec"
};

    const db = getDatabase(initializeApp(firebaseConfig));

    let masterSuppliers = [], matrixDatabase = [];

    // Sync Data
    onValue(ref(db, 'suppliers'), (s) => { 
        masterSuppliers = s.val() || [];
        render(); 
    });
    onValue(ref(db, 'disposables'), (s) => {
        const data = s.val() || {};
        matrixDatabase = Object.keys(data).map(id => ({ id, ...data[id] }));
        render();
        document.getElementById('sync-status').innerText = "☁️ Synced";
    });

    function render() {
        const table = document.getElementById('matrix-table');
        table.innerHTML = `<tr><th>Item</th>${masterSuppliers.map(s => `<th>${s} <button onclick="delSup('${s}')" class="btn" style="background:var(--danger-color)">x</button></th>`).join('')}<th>Actions</th></tr>` +
            matrixDatabase.map(row => `<tr>
                <td>${row.item}</td>
                ${masterSuppliers.map(s => `<td>
                    UOM: <input class="matrix-input" value="${row.prices?.[s]?.uom || ''}" onchange="updateCell('${row.id}', '${s}', 'uom', this.value)">
                    P: <input class="matrix-input" value="${row.prices?.[s]?.price || ''}" onchange="updateCell('${row.id}', '${s}', 'price', this.value)">
                </td>`).join('')}
                <td><button class="btn" style="background:var(--danger-color)" onclick="delItem('${row.id}')">Delete</button></td>
            </tr>`).join('');
    }

    // CRUD Logic
    window.addSupplier = () => {
        const name = document.getElementById('new-supplier').value;
        if(name) set(ref(db, 'suppliers'), [...masterSuppliers, name]);
    };
    window.delSup = (name) => set(ref(db, 'suppliers'), masterSuppliers.filter(s => s !== name));
    window.addItem = () => {
        const item = document.getElementById('new-item').value;
        if(item) push(ref(db, 'disposables'), { item, prices: {} });
    };
    window.delItem = (id) => remove(ref(db, 'disposables/' + id));
    window.updateCell = (id, sup, field, val) => {
        const row = matrixDatabase.find(r => r.id === id);
        const prices = row.prices || {};
        prices[sup] = { ...(prices[sup] || {}), [field]: val };
        update(ref(db, 'disposables/' + id), { prices });
    };
</script>
</body>
</html>
