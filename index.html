<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Supplier Comparison & Evaluation Grid</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --danger-color: #e74c3c; --info-color: #3498db; --light-bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light-bg); padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        header { background: var(--primary-color); color: white; padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .management-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-control { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
        .mapping-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; align-items: center; margin-bottom: 5px; font-size: 12px; }
        .edit-mode { display: none; }
        .view-mode { display: inline; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Master Supplier Comparison & Evaluation Grid</h1>
        <div>
            <span id="sync-status">🔄 Connecting...</span>
            <button class="btn" style="background:var(--info-color)" onclick="document.getElementById('file-input').click()">Import Excel</button>
            <button class="btn" style="background:var(--secondary-color)" onclick="exportToExcel()">Download</button>
            <button class="btn" style="background:var(--danger-color)" onclick="resetDatabase()">Reset DB</button>
            <input type="file" id="file-input" hidden accept=".xlsx, .xls, .csv">
        </div>
    </header>

    <div class="management-row">
        <div class="panel">
            <h3>Suppliers Management Panel</h3>
            <input type="text" id="new-supplier" class="form-control" placeholder="New supplier name...">
            <button class="btn" style="background:var(--secondary-color)" onclick="addSupplier()">Add Supplier</button>
            <div id="supplier-list" style="margin-top:15px;"></div>
        </div>
        <div class="panel">
            <h3>Disposables / Line Items Panel</h3>
            <input type="text" id="new-item" class="form-control" placeholder="Item description...">
            <div id="mapping-fields"></div>
            <button class="btn" style="background:var(--secondary-color); width:100%; margin-top:10px;" onclick="addItem()">Add Line Item</button>
        </div>
    </div>

    <div class="panel"><table id="matrix-table"></table></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCfXnKMYsJnbBXqgp7Mq7s-ierLgI_ihs8",
        authDomain: "lab-disposables.firebaseapp.com",
        databaseURL: "https://lab-disposables-default-rtdb.firebaseio.com",
        projectId: "lab-disposables",
        storageBucket: "lab-disposables.firebasestorage.app",
        messagingSenderId: "845647001477",
        appId: "1:845647001477:web:b8f40a2e0fe280c5dbf6ec"
    };

    const db = getDatabase(initializeApp(firebaseConfig));
    let masterSuppliers = [], matrixDatabase = [];

    const sanitizeKey = (key) => key.replace(/[.#$/[\]]/g, '').trim();

    onValue(ref(db, 'suppliers'), (s) => { masterSuppliers = s.val() || []; render(); document.getElementById('sync-status').innerText = "☁️ Firebase Synced"; });
    onValue(ref(db, 'disposables'), (s) => { const d = s.val() || {}; matrixDatabase = Object.keys(d).map(id => ({ id, ...d[id] })); render(); });

    function render() {
        document.getElementById('supplier-list').innerHTML = masterSuppliers.map(s => 
            `<div style="display:flex; justify-content:space-between; margin:5px 0;">${s} <button onclick="delSup('${s}')" style="color:red; cursor:pointer;">x</button></div>`).join('');
        
        document.getElementById('mapping-fields').innerHTML = masterSuppliers.map(s => 
            `<div class="mapping-grid"><span>${s}</span><input id="uom-${sanitizeKey(s)}" placeholder="UOM"><input id="price-${sanitizeKey(s)}" placeholder="Price"></div>`).join('');

        const table = document.getElementById('matrix-table');
        table.innerHTML = `<tr><th>Item</th>${masterSuppliers.map(s => `<th>${s}</th>`).join('')}<th>Actions</th></tr>` +
            matrixDatabase.map(row => `
                <tr id="row-${row.id}">
                    <td>${row.item}</td>
                    ${masterSuppliers.map(s => `
                        <td>
                            <span class="view-mode">UOM: ${row.prices?.[sanitizeKey(s)]?.uom || '-'} | Price: ${row.prices?.[sanitizeKey(s)]?.price || '-'}</span>
                            <div class="edit-mode">
                                UOM: <input class="uom-in" style="width:50px" data-supplier="${sanitizeKey(s)}" value="${row.prices?.[sanitizeKey(s)]?.uom || ''}"> 
                                Price: <input class="price-in" style="width:50px" data-supplier="${sanitizeKey(s)}" value="${row.prices?.[sanitizeKey(s)]?.price || ''}">
                            </div>
                        </td>`).join('')}
                    <td>
                        <button class="btn edit-btn" style="background:var(--info-color)" onclick="toggleRow('${row.id}')">Edit</button>
                        <button class="btn" style="background:var(--danger-color)" onclick="delItem('${row.id}')">Delete</button>
                    </td>
                </tr>`).join('');
    }

    window.toggleRow = (id) => {
        const row = document.getElementById(`row-${id}`);
        const btn = row.querySelector('.edit-btn');
        const isEditing = btn.innerText === "Save";

        if (isEditing) {
            const updatedPrices = {};
            row.querySelectorAll('.edit-mode').forEach(container => {
                const uom = container.querySelector('.uom-in').value;
                const price = container.querySelector('.price-in').value;
                const supplier = container.querySelector('.uom-in').dataset.supplier;
                updatedPrices[supplier] = { uom, price };
            });
            update(ref(db, 'disposables/' + id), { prices: updatedPrices });
            btn.innerText = "Edit";
        } else {
            btn.innerText = "Save";
        }
        row.querySelectorAll('.view-mode').forEach(el => el.style.display = isEditing ? 'inline' : 'none');
        row.querySelectorAll('.edit-mode').forEach(el => el.style.display = isEditing ? 'none' : 'block');
    };

    window.exportToExcel = () => {
        const exportData = matrixDatabase.map(row => {
            let flatRow = { Item: row.item };
            masterSuppliers.forEach(s => {
                flatRow[`${s} UOM`] = row.prices?.[sanitizeKey(s)]?.uom || '';
                flatRow[`${s} Price`] = row.prices?.[sanitizeKey(s)]?.price || '';
            });
            return flatRow;
        });
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Master Data");
        XLSX.writeFile(wb, "Master_Supplier_Data.xlsx");
    };

    window.resetDatabase = () => {
        if (confirm('CRITICAL: Are you sure you want to permanently delete ALL suppliers and items?')) {
            if (confirm('This action cannot be undone. Confirm final reset?')) {
                set(ref(db), null).then(() => { alert("Database has been reset."); });
            }
        }
    };

    window.addSupplier = () => { const v = document.getElementById('new-supplier').value; if(v) set(ref(db, 'suppliers'), [...masterSuppliers, sanitizeKey(v)]); };
    window.delSup = (s) => { if(confirm('Delete supplier?')) set(ref(db, 'suppliers'), masterSuppliers.filter(x => x !== s)); };
    window.addItem = () => {
        const item = document.getElementById('new-item').value;
        const prices = {};
        masterSuppliers.forEach(s => {
            const sk = sanitizeKey(s);
            prices[sk] = { uom: document.getElementById(`uom-${sk}`)?.value || "", price: document.getElementById(`price-${sk}`)?.value || "" };
        });
        if(item) push(ref(db, 'disposables'), { item, prices });
    };
    window.delItem = (id) => { if(confirm('Delete item?')) remove(ref(db, 'disposables/' + id)); };

    document.getElementById('file-input').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const wb = XLSX.read(evt.target.result, { type: 'binary' });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { range: 0 });
            data.forEach(row => {
                const itemName = row['Item'];
                if (!itemName) return;
                const prices = {};
                masterSuppliers.forEach(s => {
                    prices[sanitizeKey(s)] = { uom: row[`${s} UOM`] || "", price: row[`${s} Price`] || "" };
                });
                push(ref(db, 'disposables'), { item: itemName, prices });
            });
            alert("Upload Complete!");
        };
        reader.readAsBinaryString(e.target.files[0]);
    });
</script>
</body>
</html>
