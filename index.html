<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Supplier Comparison & Evaluation Grid</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --info-color: #3498db; --danger-color: #e74c3c; --light-bg: #f8f9fa; --border-color: #dcdde1; --text-color: #2f3640; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light-bg); padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background-color: var(--primary-color); color: white; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .management-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-control { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f1f2f6; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-info { background: #3498db; }
        .btn-primary { background: #18bc9c; }
        .btn-danger { background: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Master Supplier Comparison Grid</h1>
        <div>
            <span id="sync-indicator">🔄 Connecting...</span>
            <label class="btn btn-info">Upload Master Data <input type="file" id="upload-master-file" hidden></label>
        </div>
    </header>

    <div class="management-row">
        <div class="panel">
            <h3>Suppliers</h3>
            <div style="display:flex; gap:10px;"><input type="text" id="new-supplier-name" class="form-control"><button class="btn btn-primary" onclick="addSupplier()">Add</button></div>
            <div id="supplier-list"></div>
        </div>
        <div class="panel">
            <h3>Add Items</h3>
            <input type="text" id="new-item-name" class="form-control" placeholder="Item Name">
            <button class="btn btn-primary" style="margin-top:10px;" onclick="addItem()">Add Item</button>
        </div>
    </div>

    <div class="panel"><table id="matrix-table"></table></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteDoc, collection, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfXnKMYsJnbBXqgp7Mq7s-ierLgI_ihs8",
  authDomain: "lab-disposables.firebaseapp.com",
  databaseURL: "https://lab-disposables-default-rtdb.firebaseio.com",
  projectId: "lab-disposables",
  storageBucket: "lab-disposables.firebasestorage.app",
  messagingSenderId: "845647001477",
  appId: "1:845647001477:web:b8f40a2e0fe280c5dbf6ec"
};

    const db = getFirestore(initializeApp(firebaseConfig));
    let masterSuppliers = [], matrixDatabase = [];

    // Sync Suppliers
    onSnapshot(doc(db, "matrix_config", "suppliers"), (s) => {
        masterSuppliers = s.exists() ? s.data().list : ["Deep Seas", "Jasmin medical", "عدنان البركه"];
        renderMatrix();
    });

    // Sync Items
    onSnapshot(collection(db, "disposables"), (snap) => {
        matrixDatabase = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderMatrix();
    });

    function renderMatrix() {
        const table = document.getElementById('matrix-table');
        table.innerHTML = `<tr><th>Item</th>${masterSuppliers.map(s => `<th>${s}</th>`).join('')}</tr>` +
            matrixDatabase.map(row => `<tr><td>${row.item}</td>${masterSuppliers.map(s => `<td>${row.prices?.[s]?.price || ''}</td>`).join('')}</tr>`).join('');
    }

    window.addSupplier = async () => {
        const name = document.getElementById('new-supplier-name').value;
        if (!name) return;
        masterSuppliers.push(name);
        await setDoc(doc(db, "matrix_config", "suppliers"), { list: masterSuppliers });
    };

    window.addItem = async () => {
        const name = document.getElementById('new-item-name').value;
        if (!name) return;
        await setDoc(doc(collection(db, "disposables")), { item: name, prices: {} });
    };
</script>
</body>
</html>
