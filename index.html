<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Comparison Matrix Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #18bc9c;
            --info-color: #3498db;
            --danger-color: #e74c3c;
            --light-bg: #f8f9fa;
            --border-color: #dcdde1;
            --text-color: #2f3640;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light-bg); color: var(--text-color); padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        header h1 { font-size: 24px; margin-bottom: 5px; }
        header p { font-size: 14px; color: #bdc3c7; }
        
        .actions-bar {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-excel { background-color: #27ae60; color: white; }
        .btn-info { background-color: var(--info-color); color: white; }
        .btn-primary { background-color: var(--secondary-color); color: white; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-sm { padding: 4px 8px; font-size: 12px; }

        .management-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .panel h3 { margin-bottom: 15px; font-size: 16px; border-bottom: 2px solid var(--light-bg); padding-bottom: 8px; }

        .form-inline {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .form-vertical {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .form-control {
            width: 100%;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
        }

        .supplier-mapping-box {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            background: #fafafa;
            margin-bottom: 10px;
        }

        .supplier-mapping-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #e0e0e0;
        }
        .supplier-mapping-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .supplier-mapping-row label { font-size: 13px; font-weight: 600; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .list-container {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--light-bg);
            border-radius: 4px;
            padding: 5px;
        }

        .list-item-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--light-bg);
            padding: 6px 12px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 13px;
        }
        .list-item-btn button {
            background: transparent;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .table-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .table-responsive {
            overflow-x: auto;
            margin-top: 15px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            border: 1px solid var(--border-color);
        }
        th {
            background-color: #f1f2f6;
            color: var(--primary-color);
            font-weight: 600;
        }

        .matrix-input {
            width: 100%;
            border: 1px solid transparent;
            background: transparent;
            padding: 4px;
            font-size: 14px;
        }
        .matrix-input:focus {
            border-color: var(--info-color);
            background: white;
            outline: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Master Supplier Comparison & Evaluation Grid</h1>
            <p>Unified data entries with row-level updating controls and structural columns extraction features.</p>
        </div>
        <div class="actions-bar">
            <label class="btn btn-info" style="margin: 0; cursor: pointer;">
                📂 Upload Master Data
                <input type="file" id="upload-master-file" accept=".xlsx, .xls, .csv" style="display: none;">
            </label>
            <button class="btn btn-excel" onclick="exportToExcel()">💾 Download Excel File</button>
        </div>
    </header>

    <div class="management-row">
        <div class="panel">
            <h3>🏢 Suppliers Management Panel</h3>
            <div class="form-inline">
                <input type="text" id="new-supplier-name" class="form-control" placeholder="Type new supplier name...">
                <button class="btn btn-primary" onclick="addSupplier()">Add Supplier</button>
            </div>
            <div id="supplier-list" class="list-container" style="flex-grow: 1;"></div>
        </div>

        <div class="panel">
            <h3>📦 Disposables / Line Items Panel</h3>
            <div class="form-vertical" style="flex-grow: 1; justify-content: flex-start;">
                <input type="text" id="new-item-name" class="form-control" placeholder="Type row item description...">
                
                <div style="font-size: 12px; font-weight: 600; margin-top: 10px; margin-bottom: 5px; color:#7f8c8d;">Enter initial values per supplier (optional):</div>
                <div id="supplier-inputs-mapping-area" class="supplier-mapping-box">
                    </div>
                
                <button class="btn btn-primary" style="align-self: flex-end; margin-top: 5px;" onclick="addItem()">Add Line Item</button>
            </div>
        </div>
    </div>

    <div class="table-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0; border: none; padding: 0;">📊 Master Price Comparison Grid Sheet</h3>
            <input type="text" id="search-input" class="form-control" style="max-width: 350px;" placeholder="🔍 Live filter matrix rows dynamically...">
        </div>

        <div class="table-responsive">
            <table id="matrix-table">
                </table>
        </div>
    </div>
</div>

<script>
    // System Local Core State Memory Variables
    let masterSuppliers = ["Deep Seas", "Jasmin medical", "عدنان البركه"];
    let matrixDatabase = [
        {
            item: "Cotton Roll",
            prices: {
                "Deep Seas": { uom: "0.5Kg", price: "2.9" },
                "Jasmin medical": { uom: "0.5Kg", price: "2.75" },
                "عدنان البركه": { uom: "0.5Kg", price: "2.75" }
            }
        },
        {
            item: "3cc,5cc Syringes",
            prices: {
                "Deep Seas": { uom: "100/box", price: "2.5" },
                "Jasmin medical": { uom: "100/box", price: "3" },
                "عدنان البركه": { uom: "100/box", price: "4" }
            }
        }
    ];

    const searchInput = document.getElementById('search-input');
    document.getElementById('upload-master-file').addEventListener('change', handleMasterFileUpload);
    searchInput.addEventListener('input', renderMatrix);

    // File Upload Excel Extraction Logic Handler Function
    function handleMasterFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonRows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                
                if (jsonRows.length < 2) {
                    alert("The uploaded matrix file structure does not contain sufficient rows.");
                    return;
                }

                const headers = jsonRows[0];
                let parsedSuppliers = [];
                let supplierColumns = {};

                for (let i = 1; i < headers.length; i++) {
                    let headerStr = String(headers[i]).trim();
                    if (!headerStr) continue;

                    if (headerStr.toLowerCase().startsWith("quantity per unit")) {
                        let supplierName = headerStr.replace(/quantity per unit/i, "").trim();
                        if (supplierName) {
                            if (!parsedSuppliers.includes(supplierName)) parsedSuppliers.push(supplierName);
                            if (!supplierColumns[supplierName]) supplierColumns[supplierName] = {};
                            supplierColumns[supplierName].uom = i;
                        }
                    } else if (headerStr.toLowerCase().includes("price")) {
                        let supplierName = headerStr.replace(/price.*$/i, "").trim();
                        if (!supplierName && parsedSuppliers.length > 0) {
                            supplierName = parsedSuppliers[parsedSuppliers.length - 1];
                        }
                        if (supplierName) {
                            if (!parsedSuppliers.includes(supplierName)) parsedSuppliers.push(supplierName);
                            if (!supplierColumns[supplierName]) supplierColumns[supplierName] = {};
                            supplierColumns[supplierName].price = i;
                        }
                    }
                }

                if (parsedSuppliers.length === 0) {
                    for (let i = 2; i < headers.length; i++) {
                        let headerStr = String(headers[i]).trim();
                        if (headerStr.toLowerCase().includes("price")) {
                            let supplierName = headers[i-1] ? String(headers[i-1]).trim() : `Supplier ${i}`;
                            if (!parsedSuppliers.includes(supplierName)) parsedSuppliers.push(supplierName);
                            if (!supplierColumns[supplierName]) supplierColumns[supplierName] = {};
                            supplierColumns[supplierName].uom = i - 1;
                            supplierColumns[supplierName].price = i;
                        }
                    }
                }

                if (parsedSuppliers.length === 0) {
                    alert("Could not extract suppliers. Confirm headers contain 'Quantity per unit [Name]' and '[Name] Price'.");
                    return;
                }

                masterSuppliers = parsedSuppliers;
                matrixDatabase = [];

                for (let r = 1; r < jsonRows.length; r++) {
                    const row = jsonRows[r];
                    if (!row || row.length === 0) continue;

                    const itemName = String(row[0] || "").trim();
                    if (!itemName || itemName.toLowerCase() === "item description" || itemName.toLowerCase() === "item name") {
                        continue;
                    }

                    let pricesObj = {};
                    masterSuppliers.forEach(sup => {
                        const uomIdx = supplierColumns[sup]?.uom;
                        const priceIdx = supplierColumns[sup]?.price;
                        
                        let uomVal = uomIdx !== undefined ? String(row[uomIdx] || "").trim() : "";
                        let priceVal = priceIdx !== undefined ? String(row[priceIdx] || "").trim() : "";

                        if (uomVal === "-") uomVal = "";
                        if (priceVal === "-") priceVal = "";

                        pricesObj[sup] = { uom: uomVal, price: priceVal };
                    });

                    matrixDatabase.push({ item: itemName, prices: pricesObj });
                }

                saveToLocalStorage();
                renderManagementLists();
                renderMatrix();
                alert(`Successfully imported ${matrixDatabase.length} items for suppliers: ${masterSuppliers.join(', ')}`);

            } catch (err) {
                console.error(err);
                alert("An error occurred while handling the spreadsheet file contents mapping matrix.");
            }
        };
        reader.readAsBinaryString(file);
    }

    // Main Table Structural Grid Renderer
    function renderMatrix() {
        const table = document.getElementById('matrix-table');
        table.innerHTML = "";

        const query = searchInput.value.toLowerCase().trim();

        // Columns layout display with customized header tag text "UOM"
        let headerRow1 = `<tr><th rowspan="2" style="min-width: 240px; vertical-align: middle;">Item Description</th>`;
        let headerRow2 = `<tr>`;

        masterSuppliers.forEach(sup => {
            headerRow1 += `<th colspan="2" style="text-align: center; background-color: #dff9fb; color:#2c3e50;">${sup}</th>`;
            headerRow2 += `<th style="width: 130px;">UOM</th><th style="width: 100px;">Price</th>`;
        });

        headerRow1 += `<th rowspan="2" style="width: 90px; text-align: center; vertical-align: middle;">Actions</th></tr>`;
        headerRow2 += `</tr>`;
        
        table.innerHTML += headerRow1 + headerRow2;

        matrixDatabase.forEach((rowData, itemIdx) => {
            if (query && !rowData.item.toLowerCase().includes(query)) return;

            let rowHtml = `<tr>
                <td>
                    <input type="text" class="matrix-input" value="${rowData.item}" 
                        onchange="updateItemName(${itemIdx}, this.value)" style="font-weight: 600;">
                </td>`;
            
            masterSuppliers.forEach(sup => {
                let uomVal = rowData.prices[sup] ? rowData.prices[sup].uom : "";
                let priceVal = rowData.prices[sup] ? rowData.prices[sup].price : "";

                rowHtml += `
                    <td>
                        <input type="text" class="matrix-input" value="${uomVal}" 
                            onchange="updateCell(${itemIdx}, '${sup}', 'uom', this.value)">
                    </td>
                    <td>
                        <input type="text" class="matrix-input" value="${priceVal}" 
                            onchange="updateCell(${itemIdx}, '${sup}', 'price', this.value)" style="font-weight:600; color:#27ae60;">
                    </td>
                `;
            });

            rowHtml += `
                <td style="text-align: center;">
                    <button class="btn btn-danger btn-sm" onclick="removeItem(${itemIdx})">🗑️ Delete</button>
                </td>
            </tr>`;
            table.innerHTML += rowHtml;
        });
    }

    function updateCell(itemIdx, supplier, field, value) {
        if (!matrixDatabase[itemIdx].prices[supplier]) {
            matrixDatabase[itemIdx].prices[supplier] = { uom: "", price: "" };
        }
        matrixDatabase[itemIdx].prices[supplier][field] = value;
        saveToLocalStorage();
    }

    function updateItemName(itemIdx, value) {
        if (value.trim()) {
            matrixDatabase[itemIdx].item = value.trim();
            saveToLocalStorage();
        }
    }

    // Top Management Controls Functions
    function addSupplier() {
        const input = document.getElementById('new-supplier-name');
        const name = input.value.trim();
        if (!name) return;
        if (masterSuppliers.includes(name)) { alert("Supplier already exists."); return; }
        
        masterSuppliers.push(name);
        input.value = "";
        saveToLocalStorage();
        renderManagementLists();
        renderMatrix();
    }

    function removeSupplier(name) {
        if (!confirm(`Are you sure you want to completely remove "${name}"?`)) return;
        masterSuppliers = masterSuppliers.filter(s => s !== name);
        matrixDatabase.forEach(row => { if(row.prices[name]) delete row.prices[name]; });
        saveToLocalStorage();
        renderManagementLists();
        renderMatrix();
    }

    // Save multi-linked data configuration across suppliers
    function addItem() {
        const nameInput = document.getElementById('new-item-name');
        const name = nameInput.value.trim();
        if (!name) return;

        let pricesObj = {};
        
        masterSuppliers.forEach(sup => {
            const escapeSupKey = btoa(unescape(encodeURIComponent(sup))).replace(/=/g, "");
            const uomInp = document.getElementById(`mapping-uom-${escapeSupKey}`);
            const priceInp = document.getElementById(`mapping-price-${escapeSupKey}`);
            
            let uomVal = uomInp ? uomInp.value.trim() : "";
            let priceVal = priceInp ? priceInp.value.trim() : "";

            if (uomVal || priceVal) {
                pricesObj[sup] = { uom: uomVal, price: priceVal };
            }
        });

        matrixDatabase.push({ item: name, prices: pricesObj });
        
        // Reset element inputs
        nameInput.value = "";
        masterSuppliers.forEach(sup => {
            const escapeSupKey = btoa(unescape(encodeURIComponent(sup))).replace(/=/g, "");
            const uomInp = document.getElementById(`mapping-uom-${escapeSupKey}`);
            const priceInp = document.getElementById(`mapping-price-${escapeSupKey}`);
            if (uomInp) uomInp.value = "";
            if (priceInp) priceInp.value = "";
        });

        saveToLocalStorage();
        renderManagementLists();
        renderMatrix();
    }

    function removeItem(idx) {
        if (!confirm(`Are you sure you want to delete "${matrixDatabase[idx].item}"?`)) return;
        matrixDatabase.splice(idx, 1);
        saveToLocalStorage();
        renderMatrix();
    }

    function renderManagementLists() {
        const supList = document.getElementById('supplier-list');
        const mappingArea = document.getElementById('supplier-inputs-mapping-area');

        supList.innerHTML = "";
        mappingArea.innerHTML = "";

        masterSuppliers.forEach(sup => {
            // Suppliers pane renderer mapping
            supList.innerHTML += `
                <div class="list-item-btn">
                    <span>🏢 <strong>${sup}</strong></span>
                    <button onclick="removeSupplier('${sup}')">×</button>
                </div>`;
            
            // Dynamic form field input generator mapping row entries cleanly
            const escapeSupKey = btoa(unescape(encodeURIComponent(sup))).replace(/=/g, "");
            mappingArea.innerHTML += `
                <div class="supplier-mapping-row">
                    <label title="${sup}">🏢 ${sup}</label>
                    <input type="text" id="mapping-uom-${escapeSupKey}" class="form-control" style="padding:4px 8px; font-size:12px;" placeholder="UOM">
                    <input type="text" id="mapping-price-${escapeSupKey}" class="form-control" style="padding:4px 8px; font-size:12px;" placeholder="Price">
                </div>`;
        });
    }

    function saveToLocalStorage() {
        localStorage.setItem('mat_suppliers', JSON.stringify(masterSuppliers));
        localStorage.setItem('mat_database', JSON.stringify(matrixDatabase));
    }

    function loadLocalStorage() {
        if (localStorage.getItem('mat_suppliers')) masterSuppliers = JSON.parse(localStorage.getItem('mat_suppliers'));
        if (localStorage.getItem('mat_database')) matrixDatabase = JSON.parse(localStorage.getItem('mat_database'));
    }

    function exportToExcel() {
        let sheetData = [];
        let r1 = ["Item Description"];
        let r2 = [""];

        masterSuppliers.forEach(sup => {
            r1.push(sup, "");
            r2.push("Quantity per unit " + sup, sup + " Price (JD)");
        });

        sheetData.push(r1);
        sheetData.push(r2);

        matrixDatabase.forEach(row => {
            let dataLine = [row.item];
            masterSuppliers.forEach(sup => {
                let details = row.prices[sup];
                dataLine.push(details ? details.uom : "", details ? details.price : "");
            });
            sheetData.push(dataLine);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(sheetData);

        ws['!merges'] = [];
        for (let i = 0; i < masterSuppliers.length; i++) {
            let colIdx = 1 + (i * 2);
            ws['!merges'].push({ s: { r: 0, c: colIdx }, e: { r: 0, c: colIdx + 1 } });
        }
        ws['!merges'].push({ s: { r: 0, c: 0 }, e: { r: 1, c: 0 } });

        XLSX.utils.book_append_sheet(wb, ws, "Comparison Matrix");
        XLSX.writeFile(wb, "Supplier_Comparison_Matrix_2026.xlsx");
    }

    loadLocalStorage();
    renderManagementLists();
    renderMatrix();
</script>

</body>
</html>
