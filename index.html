<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Supplier Comparison & Evaluation Grid</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --danger-color: #e74c3c; --info-color: #3498db; --light-bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light-bg); padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        header { background: var(--primary-color); color: white; padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .management-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
        .mapping-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 5px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Master Supplier Comparison Grid</h1>
        <div>
            <span id="sync-status">🔄 Connecting...</span>
            <button class="btn" style="background:var(--info-color)" onclick="document.getElementById('file-input').click()">Upload Master Data</button>
            <input type="file" id="file-input" hidden>
        </div>
    </header>

    <div class="management-row">
        <div class="panel">
            <h3>Suppliers Management Panel</h3>
            <input type="text" id="new-supplier" placeholder="New supplier name...">
            <button class="btn" style="background:var(--secondary-color)" onclick="addSupplier()">Add Supplier</button>
            <div id="supplier-list" style="margin-top:15px;"></div>
        </div>
        <div class="panel">
            <h3>Disposables / Line Items Panel</h3>
            <input type="text" id="new-item" placeholder="Item description..." style="width:100%; margin-bottom:10px;">
            <div id="mapping-fields"></div>
            <button class="btn" style="background:var(--secondary-color); width:100%;" onclick="addItem()">Add Line Item</button>
        </div>
    </div>

    <div class="panel"><table id="matrix-table"></table></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 🔴 PASTE YOUR CONFIG HERE
  const firebaseConfig = {
  apiKey: "AIzaSyCfXnKMYsJnbBXqgp7Mq7s-ierLgI_ihs8",
  authDomain: "lab-disposables.firebaseapp.com",
  databaseURL: "https://lab-disposables-default-rtdb.firebaseio.com",
  projectId: "lab-disposables",
  storageBucket: "lab-disposables.firebasestorage.app",
  messagingSenderId: "845647001477",
  appId: "1:845647001477:web:b8f40a2e0fe280c5dbf6ec"
};

    const db = getDatabase(initializeApp(firebaseConfig));
    let masterSuppliers = [], matrixDatabase = [];

    // Sync Data
    onValue(ref(db, 'suppliers'), (s) => { masterSuppliers = s.val() || []; render(); document.getElementById('sync-status').innerText = "☁️ Firebase Synced"; });
    onValue(ref(db, 'disposables'), (s) => { const d = s.val() || {}; matrixDatabase = Object.keys(d).map(id => ({ id, ...d[id] })); render(); });

    function render() {
        // Supplier List with Delete Buttons
        document.getElementById('supplier-list').innerHTML = masterSuppliers.map(s => 
            `<div style="display:flex; justify-content:space-between; margin:5px 0;">${s} <button onclick="delSup('${s}')" style="color:red; cursor:pointer;">x</button></div>`).join('');
        
        // Dynamic Mapping Inputs
        document.getElementById('mapping-fields').innerHTML = masterSuppliers.map(s => 
            `<div class="mapping-row"><span>${s}</span><input id="uom-${s}" placeholder="UOM"><input id="price-${s}" placeholder="Price"></div>`).join('');

        // Matrix Table
        const table = document.getElementById('matrix-table');
        table.innerHTML = `<tr><th>Item</th>${masterSuppliers.map(s => `<th>${s}</th>`).join('')}<th>Actions</th></tr>` +
            matrixDatabase.map(row => `<tr><td>${row.item}</td>${masterSuppliers.map(s => 
            `<td>UOM: <input value="${row.prices?.[s]?.uom || ''}" onchange="updateCell('${row.id}', '${s}', 'uom', this.value)"> 
             P: <input value="${row.prices?.[s]?.price || ''}" onchange="updateCell('${row.id}', '${s}', 'price', this.value)"></td>`).join('')}
             <td><button class="btn" style="background:var(--danger-color)" onclick="delItem('${row.id}')">Delete</button></td></tr>`).join('');
    }

    // Handlers
    window.addSupplier = () => { const v = document.getElementById('new-supplier').value; if(v) set(ref(db, 'suppliers'), [...masterSuppliers, v]); };
    window.delSup = (s) => set(ref(db, 'suppliers'), masterSuppliers.filter(x => x !== s));
    window.addItem = () => {
        const item = document.getElementById('new-item').value;
        const prices = {};
        masterSuppliers.forEach(s => prices[s] = { uom: document.getElementById(`uom-${s}`).value, price: document.getElementById(`price-${s}`).value });
        if(item) push(ref(db, 'disposables'), { item, prices });
    };
    window.delItem = (id) => remove(ref(db, 'disposables/' + id));
    window.updateCell = (id, s, f, val) => {
        const row = matrixDatabase.find(r => r.id === id);
        if(!row.prices[s]) row.prices[s] = {};
        row.prices[s][f] = val;
        update(ref(db, 'disposables/' + id), { prices: row.prices });
    };
</script>
</body>
</html>
