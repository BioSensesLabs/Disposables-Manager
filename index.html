<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Supplier Comparison Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --danger-color: #e74c3c; --light-bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--light-bg); padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .panel { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .management-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-primary { background: var(--secondary-color); }
        .btn-danger { background: var(--danger-color); }
    </style>
</head>
<body>
<div class="container">
    <header style="background:var(--primary-color); color:white; padding:20px; border-radius:8px;">
        <h1>Master Supplier Comparison Grid</h1>
        <span id="sync-status">🔄 Connecting...</span>
        <label class="btn" style="background:#3498db">Upload CSV/XLSX <input type="file" id="upload-master-file" hidden></label>
    </header>

    <div class="management-row">
        <div class="panel">
            <h3>Suppliers</h3>
            <div style="display:flex; gap:10px;"><input type="text" id="new-supplier-name" placeholder="Supplier Name"><button class="btn btn-primary" onclick="addSupplier()">Add</button></div>
            <div id="supplier-list"></div>
        </div>
        <div class="panel">
            <h3>Add Line Item</h3>
            <input type="text" id="new-item-name" placeholder="Item Name">
            <button class="btn btn-primary" onclick="addItem()">Add Item</button>
        </div>
    </div>

    <div class="panel"><table id="matrix-table"></table></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

   const firebaseConfig = {
  apiKey: "AIzaSyCfXnKMYsJnbBXqgp7Mq7s-ierLgI_ihs8",
  authDomain: "lab-disposables.firebaseapp.com",
  databaseURL: "https://lab-disposables-default-rtdb.firebaseio.com",
  projectId: "lab-disposables",
  storageBucket: "lab-disposables.firebasestorage.app",
  messagingSenderId: "845647001477",
  appId: "1:845647001477:web:b8f40a2e0fe280c5dbf6ec"
};

    const db = getDatabase(initializeApp(firebaseConfig));
    let masterSuppliers = [], matrixDatabase = [];

    // Sync Data from Realtime DB
    onValue(ref(db, 'config/suppliers'), (s) => {
        masterSuppliers = s.val() || ["Deep Seas", "Jasmin medical", "عدنان البركه"];
        renderMatrix();
        document.getElementById('sync-status').innerText = "☁️ Synced";
    });

    onValue(ref(db, 'disposables'), (s) => {
        const data = s.val() || {};
        matrixDatabase = Object.keys(data).map(id => ({ id, ...data[id] }));
        renderMatrix();
    });

    function renderMatrix() {
        const table = document.getElementById('matrix-table');
        table.innerHTML = `<tr><th>Item</th>${masterSuppliers.map(s => `<th>${s}</th>`).join('')}</tr>` +
            matrixDatabase.map(row => `<tr><td>${row.item}</td>${masterSuppliers.map(s => `<td>${row.prices?.[s]?.price || ''}</td>`).join('')}</tr>`).join('');
    }

    window.addSupplier = () => {
        const name = document.getElementById('new-supplier-name').value;
        if (!name) return;
        masterSuppliers.push(name);
        set(ref(db, 'config/suppliers'), masterSuppliers);
    };

    window.addItem = () => {
        const item = document.getElementById('new-item-name').value;
        if (!item) return;
        push(ref(db, 'disposables'), { item, prices: {} });
    };

    // CSV Parser remains the same, but uses push(ref(db, 'disposables'), ...)
</script>
</body>
</html>
