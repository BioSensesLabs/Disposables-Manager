<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supplier Matrix - Realtime Database Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        #sync-status { font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="sync-status">🔄 Connecting...</h2>
        <input type="file" id="file-upload" accept=".csv, .xlsx">
        <table id="matrix-table">
            <thead><tr><th>Item</th><th>Price</th></tr></thead>
            <tbody id="matrix-body"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCfXnKMYsJnbBXqgp7Mq7s-ierLgI_ihs8",
  authDomain: "lab-disposables.firebaseapp.com",
  databaseURL: "https://lab-disposables-default-rtdb.firebaseio.com",
  projectId: "lab-disposables",
  storageBucket: "lab-disposables.firebasestorage.app",
  messagingSenderId: "845647001477",
  appId: "1:845647001477:web:b8f40a2e0fe280c5dbf6ec"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const status = document.getElementById('sync-status');
        
        // Listen for data
        onValue(ref(db, 'disposables'), (snapshot) => {
            const data = snapshot.val();
            const tableBody = document.getElementById('matrix-body');
            tableBody.innerHTML = "";
            if (data) {
                Object.keys(data).forEach(key => {
                    const row = data[key];
                    tableBody.innerHTML += `<tr><td>${row.item || ''}</td><td>${row.price || ''}</td></tr>`;
                });
                status.innerText = "☁️ Realtime Synced";
            }
        });

        // Upload CSV/Excel
        document.getElementById('file-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                rows.slice(1).forEach(row => {
                    if (row[0]) push(ref(db, 'disposables'), { item: row[0], price: row[1] || "" });
                });
                status.innerText = "✅ Upload Complete";
            };
            reader.readAsBinaryString(file);
        });
    </script>
</body>
</html>
