<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Comparison Matrix Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --info-color: #3498db; --danger-color: #e74c3c; --light-bg: #f8f9fa; --border-color: #dcdde1; --text-color: #2f3640; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light-bg); color: var(--text-color); padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background-color: var(--primary-color); color: white; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .management-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-control { width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 4px; }
        .btn { padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: 600; }
        .btn-info { background: var(--info-color); }
        .btn-primary { background: var(--secondary-color); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid var(--border-color); }
        th { background: #f1f2f6; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Master Supplier Comparison Grid</h1>
        <div>
            <span id="sync-indicator">🔄 Connecting...</span>
            <label class="btn btn-info">Upload Data <input type="file" id="upload-file" hidden></label>
        </div>
    </header>

    <div class="management-row">
        <div class="panel">
            <h3>Suppliers</h3>
            <input type="text" id="new-supplier" class="form-control" placeholder="Supplier name...">
            <button class="btn btn-primary" onclick="addSupplier()">Add Supplier</button>
            <div id="supplier-list"></div>
        </div>
        <div class="panel">
            <h3>Add Items</h3>
            <input type="text" id="new-item" class="form-control" placeholder="Item description...">
            <button class="btn btn-primary" onclick="addItem()">Add Item</button>
        </div>
    </div>

    <div class="panel"><table id="matrix-table"></table></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCfXnKMYsJnbBXqgp7Mq7s-ierLgI_ihs8",
  authDomain: "lab-disposables.firebaseapp.com",
  databaseURL: "https://lab-disposables-default-rtdb.firebaseio.com",
  projectId: "lab-disposables",
  storageBucket: "lab-disposables.firebasestorage.app",
  messagingSenderId: "845647001477",
  appId: "1:845647001477:web:b8f40a2e0fe280c5dbf6ec"
};

    const db = getDatabase(initializeApp(firebaseConfig));
    let masterSuppliers = [], matrixDatabase = [];

    // Sync Data
    onValue(ref(db, 'suppliers'), (s) => {
        masterSuppliers = s.val() || ["Deep Seas", "Jasmin medical", "عدنان البركه"];
        document.getElementById('sync-indicator').innerText = "☁️ Synced";
        render();
    });

    onValue(ref(db, 'disposables'), (s) => {
        const data = s.val() || {};
        matrixDatabase = Object.keys(data).map(id => ({ id, ...data[id] }));
        render();
    });

    function render() {
        const table = document.getElementById('matrix-table');
        table.innerHTML = `<tr><th>Item</th>${masterSuppliers.map(s => `<th>${s}</th>`).join('')}</tr>` +
            matrixDatabase.map(row => `<tr><td>${row.item}</td>${masterSuppliers.map(s => 
            `<td>${row.prices?.[s]?.price || ''}</td>`).join('')}</tr>`).join('');
    }

    window.addSupplier = () => {
        const name = document.getElementById('new-supplier').value;
        if (!name) return;
        masterSuppliers.push(name);
        set(ref(db, 'suppliers'), masterSuppliers);
    };

    window.addItem = () => {
        const item = document.getElementById('new-item').value;
        if (!item) return;
        push(ref(db, 'disposables'), { item, prices: {} });
    };
</script>
</body>
</html>
